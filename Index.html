<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeakUp – Communication Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #fdf6ff;
      --surface: #ffffff;
      --primary: #7c3aed;
      --primary-light: #ede9fe;
      --primary-mid: #a78bfa;
      --accent: #d946ef;
      --accent-light: #fae8ff;
      --text: #2d1b4e;
      --text-mid: #6b4fa0;
      --text-light: #a085c3;
      --border: #e9d5ff;
      --good: #059669;
      --warn: #d97706;
      --bad: #dc2626;
      --radius: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 10% 15%, rgba(167,139,250,0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 85%, rgba(217,70,239,0.13) 0%, transparent 50%);
    }

    header {
      text-align: center;
      padding: 36px 20px 16px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-mid);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 16px auto 0;
    }

    .lang-btn {
      padding: 8px 24px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 14px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: 0 6px 30px rgba(124,58,237,0.09);
      padding: 22px 20px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 14px;
    }

    /* Topics */
    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 12px;
    }

    .topic-chip {
      padding: 11px 12px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      line-height: 1.3;
    }

    .topic-chip.selected,
    .topic-chip:active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 50px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      width: 100%;
      font-size: 1rem;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(124,58,237,0.25);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-mid);
      font-size: 0.88rem;
    }

    /* Duration */
    .duration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .duration-btn {
      padding: 11px 10px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }

    .duration-btn.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    /* Topic display */
    #topic-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 12px;
      min-height: 2rem;
    }

    /* Timer */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    #timer-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 3px;
    }

    #timer-display.running { color: var(--accent); }

    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: var(--primary-light);
      border-radius: 50px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 50px;
      width: 0%;
      transition: width 1s linear;
    }

    .timer-btns {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .timer-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }

    #start-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 14px rgba(124,58,237,0.25);
    }

    #reset-btn {
      background: var(--primary-light);
      color: var(--primary);
    }

    #status-msg {
      font-size: 0.88rem;
      color: var(--text-light);
      text-align: center;
    }

    /* Speech input */
    .speech-label {
      font-size: 0.88rem;
      color: var(--text-mid);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .textarea-wrap {
      position: relative;
    }

    #speech-input {
      width: 100%;
      min-height: 140px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--primary-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border 0.2s;
      line-height: 1.6;
    }

    #speech-input:focus {
      border-color: var(--primary-mid);
    }

    .word-count {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 5px;
    }

    .mic-hint {
      background: var(--accent-light);
      border: 1.5px solid #f0abfc;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.85rem;
      color: var(--text-mid);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .mic-hint strong { color: var(--accent); }

    /* Results */
    #results-section { display: none; }

    .final-score-wrap {
      text-align: center;
      padding: 24px 20px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      margin-bottom: 16px;
    }

    .big-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .grade-label {
      font-size: 1.1rem;
      color: var(--text-mid);
      margin-top: 4px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .score-card {
      background: var(--primary-light);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      border: 1.5px solid var(--border);
    }

    .score-card .label {
      font-size: 0.75rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .score-card .value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .value.good { color: var(--good); }
    .value.warn { color: var(--warn); }
    .value.bad  { color: var(--bad); }

    .filler-wrap {
      background: var(--accent-light);
      border-radius: 14px;
      padding: 14px 16px;
      border: 1.5px solid #f0abfc;
      margin-bottom: 14px;
    }

    .filler-wrap strong {
      color: var(--accent);
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filler-list { display: flex; flex-wrap: wrap; gap: 7px; }

    .filler-tag {
      background: white;
      border: 1.5px solid #f0abfc;
      color: var(--accent);
      border-radius: 50px;
      padding: 3px 12px;
      font-size: 0.85rem;
    }

    .feedback-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 18px;
    }

    .feedback-list li {
      display: flex;
      gap: 10px;
      font-size: 0.9rem;
      background: var(--bg);
      border-radius: 12px;
      padding: 12px 14px;
      border-left: 4px solid var(--primary-mid);
      line-height: 1.5;
    }

    .result-btns {
      display: flex;
      gap: 10px;
    }

    .result-btns button {
      flex: 1;
      padding: 13px;
      border-radius: 50px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    #try-again-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
    }

    #new-topic-btn {
      background: var(--primary-light);
      color: var(--primary);
    }

    .custom-input {
      width: 100%;
      padding: 11px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      margin-top: 10px;
    }

    .custom-input:focus { border-color: var(--primary-mid); }
  </style>
</head>
<body>

<header>
  <h1>✦ SpeakUp</h1>
  <p>Your personal communication coach</p>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en', this)">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('fr', this)">🇫🇷 Français</button>
  </div>
</header>

    <div class="card-title">📋 Step 1 — Choose a Topic</div>
    <div class="topic-grid" id="topic-grid"></div>
    <button class="btn btn-outline" onclick="refreshTopics()" style="margin-bottom:10px">🔄 New Topics</button>
